name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@platform/shared

      - name: Type-check API
        run: npm run build --workspace=@platform/api

      - name: Run shared tests
        run: npm run test --workspace=@platform/shared

      - name: Run API tests
        run: npm run test --workspace=@platform/api
        env:
          NODE_ENV: test

      - name: Build web app (static export)
        run: npm run build --workspace=@platform/web
        env:
          NEXT_PUBLIC_API_BASE_URL: https://placeholder-for-ci.example.com

      - name: Run web tests
        run: npm run test --workspace=@platform/web
